name: Agent-Web Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        working-directory: agent-web
        run: npm ci
      - name: Run tests
        working-directory: agent-web
        run: npm run test:ci