<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JARVIS Research OS</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  </head>
  <body>
    <canvas id="particle-canvas"></canvas>
    <div id="app">
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="logo-block">
            <span class="logo-mark">&#10024;</span>
            <div>
              <h1>JARVIS Research OS</h1>
              <p>Agent Web Interface</p>
            </div>
          </div>
          <button id="new-session-btn" type="button">+ New Session</button>
        </div>

        <section class="sidebar-section">
          <label for="model-selector">Model</label>
          <select id="model-selector"></select>
        </section>

        <section class="sidebar-section">
          <div class="section-title-row">
            <h2>Session History</h2>
          </div>
          <div id="session-history" class="session-history"></div>
        </section>

        <section class="sidebar-section">
          <h2>System Status</h2>
          <div id="status-panel" class="status-panel">
            <div class="status-group">
              <h3>MCP Servers</h3>
              <div id="mcp-status"></div>
            </div>
            <div class="status-group">
              <h3>Skills</h3>
              <div id="skills-status"></div>
            </div>
          </div>
        </section>
      </aside>

      <main id="main">
        <nav class="tab-nav" aria-label="Main tabs">
          <button type="button" class="tab-btn active" data-tab="chat-container">Chat</button>
          <button type="button" class="tab-btn" data-tab="pipeline-container">Pipeline</button>
          <button type="button" class="tab-btn" data-tab="monitor-container">Monitor</button>
        </nav>

        <div id="chat-container" class="tab-panel active">
          <header class="main-header">
            <div>
              <p class="eyebrow">Active Model</p>
              <h2 id="current-model-label">Loading...</h2>
            </div>
          </header>

          <section id="chat-messages" class="chat-messages"></section>

          <form id="chat-input-form" class="chat-input-form">
            <textarea
              id="chat-input"
              rows="1"
              placeholder="Message JARVIS... &#10024;"
              autocomplete="off"
            ></textarea>
            <button id="send-button" type="submit">&#10024; Send</button>
          </form>
        </div>

        <div id="pipeline-container" class="tab-panel"></div>
        <div id="monitor-container" class="tab-panel"></div>
      </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
