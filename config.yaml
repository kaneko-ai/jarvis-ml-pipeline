obsidian:
  vault_path: "H:\\マイドライブ\\obsidian-vault"
  papers_folder: JARVIS/Papers
  notes_folder: JARVIS/Notes
zotero:
  api_key: ''
  user_id: ''
  collection: JARVIS
search:
  default_sources: [pubmed, semantic_scholar, openalex]
  max_results: 20
llm:
  default_provider: gemini
  default_model: gemini/gemini-2.0-flash
  fallback_model: openai/gpt-4.1
  models:
    gemini: gemini/gemini-2.0-flash
    openai: openai/gpt-5-mini
    deepseek: deepseek/deepseek-reasoner
  cache_enabled: true
  max_retries: 3
  temperature: 0.3
evidence:
  use_llm: false
  strategy: weighted_average
storage:
  logs_dir: "H:\\マイドライブ\\jarvis-data\\logs"
  exports_dir: "H:\\マイドライブ\\jarvis-data\\exports"
  pdf_archive_dir: "H:\\マイドライブ\\jarvis-data\\pdf-archive"
  local_fallback: logs

digest:
  keywords:
    - "CRISPR gene therapy"
    - "PD-1 immunotherapy"
    - "PD-1"
    - "spermidine"
    - "cancer"
  schedule_hour: 7
  schedule_minute: 0
  papers_per_keyword: 10
  summarize_top_n: 5
  output_dir: "agent-web/data/digests"

